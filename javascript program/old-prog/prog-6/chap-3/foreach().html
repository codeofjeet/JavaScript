<html>
    <head>
        <title>forEach()</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var i;
            var a="";
            var name=["anil", "deepak", "gaurav", "bhupendra", "sumit", 10, 20, 30, {}];
            name.forEach(function(item, index)
            {
                a+=index + "   " + item;
                a+="\n";
            //document.writeln(index +"  " + item +"<br>");
            });
                alert(a);
           } 
        </script>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
