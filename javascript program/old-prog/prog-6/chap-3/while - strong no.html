<html>
    <head>
        <title>while-Strong no</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var no=document.getElementById("n1").value;
            no=parseInt(no);
            var sum=0;
            var a;
            var fact;
            var i;
            var n=no;
                while(no>0)
                {
                    a=no%10;
                    i=1;
                    fact=1;
                        while(i<=a)
                        {
                            fact=fact*i;
                            i++;
                        }
                    sum=sum+fact;
                    no=parseInt(no/10);
                }
                
                if(sum==n)
                {
                    document.getElementById("result").value="Strong no";
                }
                else
                {
                    document.getElementById("result").value="Not a strong no";
                }
           }
           
        </script>
        <label>Enter any no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n1" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <input type="text" placeholder="No are" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
