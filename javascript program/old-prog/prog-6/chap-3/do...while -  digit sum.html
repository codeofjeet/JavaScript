<html>
    <head>
        <title>do...while-digit sum</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var no=document.getElementById("n").value;
            no=parseInt(no);
            var sum=0;
            var a;
                do
                {
                    a=no%10;
                    sum=sum+a;
                    no=parseInt(no/10);   
                }while(no>0);
                    document.getElementById("result").value=sum;
           }
           
        </script>
        <label>Enter any no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <input type="text" placeholder="Digit sum is" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
