<html>
    <head>
        <title>for - 5</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var i;
            var j;
            var a="";
            var no;
                for(i=1;i<=4;i++)
                {
                    no=65;
                    for(j=1;j<=i;j++)
                    {
                       // document.writeln("*");
                       a+=String.fromCharCode(no) + " ";
                       no++;
                       //charCodeAt() method se character ki ascii value find hoti hain
                    }
                    //document.writeln("<br>");
                    a+="\n";
                }
                alert(a);
           }
           
        </script>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
