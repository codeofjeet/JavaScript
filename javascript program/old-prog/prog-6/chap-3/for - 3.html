<html>
    <head>
        <title>for - 3</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var i;
            var j;
            var a="";
                for(i=1;i<=4;i++)
                {
                    for(j=1;j<=i;j++)
                    {
                       // document.writeln("*");
                       a+=i + " ";
                    }
                    //document.writeln("<br>");
                    a+="\n";
                }
                alert(a);
           }
           
        </script>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
