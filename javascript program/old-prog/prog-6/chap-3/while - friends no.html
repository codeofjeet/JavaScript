<html>
    <head>
        <title>while-Friends no</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var no1=document.getElementById("n1").value;
            no1=parseInt(no1);
            var no2=document.getElementById("n2").value;
            no2=parseInt(no2);
            var a1=0;
            var a2=0;
            var i=1;
                while(i<=no1)
                {
                    if(no1%i==0)
                    {
                        a1++;
                    }
                i++;
                }
            i=1;
                while(i<=no2)
                {
                    if(no2%i==0)
                    {
                        a2++;
                    }
                i++;
                }
                if(no1>no2)
                {
                    i=no1-no2;
                }
                else
                {
                    i=no2-no1;
                }
                if((i==2) && (a1==2 && a2==2))
                {
                    document.getElementById("result").value="Friends no";
                }
                else
                {
                    document.getElementById("result").value="Not Friends no";
                }
           }
           
        </script>
        <label>Enter first no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n1" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <label>Enter second no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n2" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <input type="text" placeholder="No are" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
