<html>
    <head>
        <title>while exmp-2</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var i=1;
                while(i<=5)
                {
                    document.write(i + "<br>");
                    i++;
                }
           }
           
        </script>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
