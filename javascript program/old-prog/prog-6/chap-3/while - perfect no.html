<html>
    <head>
        <title>while-Perfect no</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var no1=document.getElementById("n1").value;
            no1=parseInt(no1);
            var sum=0;
            var i=1;
                while(i<no1)
                {
                    if(no1%i==0)
                    {
                        sum=sum+i;
                    }
                i++;
                }
                
                if(sum==no1)
                {
                    document.getElementById("result").value="Perfect no";
                }
                else
                {
                    document.getElementById("result").value="Not a perfect no";
                }
           }
           
        </script>
        <label>Enter any no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n1" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <input type="text" placeholder="No are" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
