<html>
    <head>
        <title>while-factorial no</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var i=1;
            var no=document.getElementById("n").value;
            no=parseInt(no);
            var fact=1;
                while(i<=no)
                {
                    fact=fact*i;
                    i++;
                }
                    document.getElementById("result").value=fact;
           }
           
        </script>
        <label>Enter any no</label>
        <br>
        <input type="text" placeholder="Only Positive no" id="n" onfocus="this.placeholder=''" onblur="this.placeholder='Only Positive no'" >
        <br><br>
        <input type="text" placeholder="Factorial is" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
    </body>
</html>
