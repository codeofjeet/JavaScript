<html>
    <head>
        <title>chap-1, Calculate one items cost price</title>
    </head>
    <body>
        <script type="text/javascript">
            var sp,cp,profit;
            sp=parseInt(prompt("Enter 10 items selling price :-"));
            profit=parseInt(prompt("Enter 10 items selling profit:-"));
            cp=(sp-profit)/10;
            document.write("10 items selling price :- " + (sp))
            document.write("<br>");
            document.write("10 items selling profit :-" + (profit));
            document.write("<br>");
            document.write("One item cost price :-" + (cp));
        </script>
    </body>
</html>
