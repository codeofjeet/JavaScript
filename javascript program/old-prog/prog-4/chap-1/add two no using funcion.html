<html>
    <head>
        <title>function program </title>
    </head>
    <body>
        <script type="text/javascript">
            var sum,no1,no2;
            function add(n1,n2)
            {
                return n1+n2;
            }
            no1=parseInt(prompt("Enter first no"));
            no2=parseInt(prompt("Enter second no"));
            sum=add(no1,no2);
            document.write("sum of two no is:- " + (sum));
        </script>
    </body>
</html>
