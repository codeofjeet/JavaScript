<html>
    <head>
        <title>chap-1, first and last digit sum</title>
    </head>
    <body>
        <script type="text/javascript">
            var no,sum=0;
            no=parseInt(prompt("Enter 4 digit no :-"));
            sum=(no%10) + parseInt(no/1000);
            document.write("No is :- " + (no));
            document.write("<br>");
            document.write("First and last digit sum is :-" + (sum));
        </script>
    </body>
</html>
