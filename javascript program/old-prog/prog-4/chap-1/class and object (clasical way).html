<html>
    <head>
        <title>class and object (clasical way)</title>
    </head>
    <body>
        <script type="text/javascript">
        class Employee
        {
            consructor(id,name)
            {
                this.id=id;
                this.name=name;
            }
            display()
            {
                document.writeln(this.id+" "+this.name);
            }
        }
        var e1=newEmployee(3,"Deepak Mulchandani");
        e1.display();
        </script>
    </body>
</html>
