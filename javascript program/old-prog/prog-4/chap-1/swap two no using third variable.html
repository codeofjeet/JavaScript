<html>
    <head>
        <title>chap-1, swap two no using third variable</title>
    </head>
    <body>
        <script type="text/javascript">
            var no1,no2,a;
            no1=parseInt(prompt("Enter fist no:-"));
            no2=parseInt(prompt("Enter second no:-"));
            a=no1;
            no1=no2;
            no2=a;
            document.write("No1 is:- " + (no1));
            document.write("<br>");
            document.write("No2 is:-" + (no2));
        </script>
    </body>
</html>
