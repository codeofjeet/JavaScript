<html>
    <head>
        <title>chap-1, Total Salary</title>
    </head>
    <body>
        <script type="text/javascript">
            var bs,da,hra,ts;
            bs=parseFloat(prompt("Enter your age in year :-"));
            da=parseFloat(bs*.98);
            hra=parseFloat(bs*.15);
            ts=bs+da+hra;
            document.write("Basic Salary is :- " + (bs))
            document.write("<br>");
            document.write("Dearness Allowance is :-" + (da));
            document.write("<br>");
            document.write("House Rent Allowance is :-" + (hra));
            document.write("<br>");
            document.write("Total Salary is :-" + (ts));
        </script>
    </body>
</html>
