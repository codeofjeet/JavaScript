<html>
    <head>
        <title>chap-1, simple interest</title>
    </head>
    <body>
        <script type="text/javascript">
            var prip,ri,time,si;
            prip=parseInt(prompt("Enter total principal :-"));
            ri=parseInt(prompt("Enter rate of interest :-"));
            time=parseInt(prompt("Enter total time :-"));
            si=(prip*ri*time)/100;
            document.write("Simple interest is :- " + (si));
        </script>
    </body>
</html>
