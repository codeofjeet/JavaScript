<html>
    <head>
        <title>chap-1, Calculate one items cost price</title>
    </head>
    <body>
        <script type="text/javascript">
            var s1,s2,s3,s4,avg;
            s1=parseInt(prompt("Enter first subject mark :-"));
            s2=parseInt(prompt("Enter second subject mark :-"));
            s3=parseInt(prompt("Enter third subject mark :-"));
            s4=parseInt(prompt("Enter fourth subject mark :-"));
            avg=(s1+s2+s3+s4)/4;
            document.write("Average mark :- " + (avg));
        </script>
    </body>
</html>
