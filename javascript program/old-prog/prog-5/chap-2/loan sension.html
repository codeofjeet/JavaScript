<html>
    <head>
        <title>loan sension</title>
    </head>
    <body>
        <script type="text/javascript">
           function abc()
           {
            var cl=document.getElementById('c').value;
            cl=parseInt(cl);
            var ppl=document.getElementById("p1").value;
            ppl=parseInt(ppl);
            var pl=document.getElementById("p2").value;
            pl=parseInt(pl);
                if(ppl>0)
                {
                    document.getElementById("result").value=0;
                }
                else if(pl+cl>80000)
                {
                    document.getElementById("result").value=(80000-pl);
                }
                else
                {
                    document.getElementById("result").value=cl;
                }
           }
           function abc1()
           {
            document.getElementById("p1").disabled=false;
           }
           function abc2()
           {
            document.getElementById("p2").disabled=false;
           }
        </script>
        <label for="char">Enter current loan amount</label>
        <br>
        <input type="text" placeholder="Amount" id="c" onfocus="this.placeholder=''" onblur="this.placeholder='Amount'" >
        <br><br>
        <input type="checkbox" onclick="abc1();">
        <label></label>Previous to Previous loan</label>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <input type="checkbox" onclick="abc2();">
        <label></label>Previous loan</label>
        <br>
        <input type="text" placeholder="Amount" id="p1" onfocus="this.placeholder=''" onblur="this.placeholder='Amount'" disabled="true">
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <input type="text" placeholder="Amount" id="p2" onfocus="this.placeholder=''" onblur="this.placeholder='Amount'" disabled="true" >
        <br><br>
        <label for="ans" id="ans">Sension Loan</label>
        <br>
        <input type="text" placeholder="Amount" id="result">
        <br><br>
        <button id="btn" onclick="abc(); return false;">click me </button>
        </form>
    </body>
</html>
