<html>
    <head>
        <title>cast your vote or not</title>
    </head>
    <body>
        <script type="text/javascript">
           var no;
           no=parseInt(prompt("Enter any no"));
                if(no%2==0)
                {
                    document.write("Even no");
                }
                else
                {
                    document.write("Odd no");
                }
        </script>
    </body>
</html>
