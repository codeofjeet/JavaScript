<html>
    <head>
        <title>sort three no</title>
    </head>
    <body>
        <script type="text/javascript">
            var no1,no2,no3,temp;
            no1=parseInt(prompt("Enter first no"));
            no2=parseInt(prompt("Enter second no"));
            no3=parseInt(prompt("Enter third no"));
                if(no1>no2)
                {
                    temp=no1;
                    no1=no2;
                    no2=temp;
                }
                if(no1>no3)
                {
                    temp=no1;
                    no1=no3;
                    no3=temp;
                }
                if(no2>no3)
                {
                    temp=no2;
                    no2=no3;
                    no3=temp;
                }
            document.write("no1 is:-" + no1 + "<br>");
            document.write("no2 is:-" + "<br>");
            document.write("no3 is:- " + "<br>");
        </script>
    </body>
</html>
