<html>
    <head>
        <title>widthow amount</title>
    </head>
    <body>

                if(wa>=500)

                    n500=parseInt(wa/500);

                    document.write("Total 500 Rs notes :- " + (n500) + "<br>"); 
                }

                if(wa>=200)
                {
                    n200=parseInt(wa/200);
                    wa=wa%200;

                }

                    document.write("Total 100 Rs notes :- " + (n100) + "<br>");
                }

                if(wa>=50)
                {

                }

                if(wa>=20)
                {
                    n20=parseInt(wa/20);
                    wa=wa%20;
                    document.write("Total 20 Rs notes :- " + (n20) + "<br>");
                }

                if(wa>=10)
                {

                    document.write("Total 10 Rs notes :- " + (n10) + "<br>");
                }

                if(wa>=5)
                {
                    n5=parseInt(wa/5);

                }

                if(wa>=2)

                }

                if(wa>=1)
                {
                    n1=parseInt(wa/1);

                }
        </script>
    </body>
</html>
