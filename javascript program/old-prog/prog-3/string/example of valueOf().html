<html>
    <head>
        <title>example of valueOf()</title>
    </head>
    <body>
        <script type="text/javascript">
        //valueof return string type object value
        var n1=new String("deepak");
        var n2 = n1.valueOf();
        document.writeln("Your name is :- " + n1);
        document.writeln("<br>Value of n1 object is :- " + n2);
        </script>
    </body>
</html>
