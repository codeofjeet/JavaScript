<html>
    <head>
        <title>example of split()</title>
    </head>
    <body>
        <script type="text/javascript">
        //split() this method split any string according given split character
        var n1="deepak kumar mulchandani";
        var n2 = n1.split(" ");
        document.writeln("Main string is :- " + n1);
        document.writeln("<br>After split space character now string is :- " + n2);
        </script>
    </body>
</html>
