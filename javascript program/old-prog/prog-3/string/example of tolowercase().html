<html>
    <head>
        <title>example of tolowercase()</title>
    </head>
    <body>
        <script type="text/javascript">
        //tolowercase() change upper character string into lower case string
        var n1="DEEPAK MULCHANDANI";
        var n2 = n1.toLowerCase();
        document.writeln("Your name in upper case is :- " + n1);
        document.writeln("<br>Your name in lower case is :- " + n2);
        </script>
    </body>
</html>
