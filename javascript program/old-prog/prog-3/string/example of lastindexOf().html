<html>
    <head>
        <title>example of lastindexOf()</title>
    </head>
    <body>
        <script type="text/javascript">
        //lastindexOf() method find right to left any give char position
        var n1="Deepak Kumar Mulchandani";
        var value = n1.lastIndexOf('a') + 1;
        var value1 = n1.lastIndexOf('a',19) +1;
        document.writeln("Your name is :- " + n1);
        document.writeln("<br>In your name last time char 'a' appear at :-" + value);
        document.writeln("<br>In your name second last time char 'a' appear at :-" + value1);
        </script>
    </body>
</html>
