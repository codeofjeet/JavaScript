<html>
    <head>
        <title>example of indexOf()</title>
    </head>
    <body>
        <script type="text/javascript">
        //indexOf() method found any given char/word position which appear first time in string
        var n1="Deepak Kumar Mulchandani";
        var ans1 = n1.indexOf('e') + 1;
        var ans2 = n1.indexOf('e',2) + 1;
        var ans3 = n1.indexOf("Kumar") + 1;
        document.writeln("Your name is :- " + n1);
        document.writeln("<br>In your name first time char 'e' appear at :- " + ans1);
        document.writeln("<br>In your name second time char 'e' appear at :- " + ans2);
        document.writeln("<br>In your name 'Kumar' appear at :- " + ans3);
        </script>
    </body>
</html>
