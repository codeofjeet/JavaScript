<html>
    <head>
        <title>example of substring()</title>
    </head>
    <body>
        <script type="text/javascript">
        //substring() method used to cut and sub string in given string in this method use used to start position and end position of sub string
        var n1="once upon a time.";
        var n2 = n1.substring(5);
        var n3 = n1.substring(5,10);
        document.writeln("Main string is :<br>" + n1);
        document.writeln("<br>After slice  6th position sub string is :<br>" + n2);
        document.writeln("<br>After slice  6th position and end position is 11 now sub string is :<br>" + n3);
        </script>
    </body>
</html>
