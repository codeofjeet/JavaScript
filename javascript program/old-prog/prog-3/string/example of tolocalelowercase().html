<html>
    <head>
        <title>example of tolocalelowercase()</title>
    </head>
    <body>
        <script type="text/javascript">
        //tolocalelowercase() change upper character string into lower case string in locale languag
        var n1="DEEPAK MULCHANDANI";
        var n2 = n1.toLocaleLowerCase();
        document.writeln("Your name in upper case is :- " + n1);
        document.writeln("<br>Your name in lower case in your locale english is :- " + n2);
        </script>
    </body>
</html>
