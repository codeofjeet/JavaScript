<html>
    <head>
        <title>example of trim()</title>
    </head>
    <body>
        <script type="text/javascript">
        //trim() this method remove all space from string at start and end 
        var n1=" deepak ";
        var n2 = n1.trim();
        document.writeln("Main string with space is :- " + n1);
        document.writeln("<br>After removing all space from start and end your string is :- " + n2);
        </script>
    </body>
</html>
