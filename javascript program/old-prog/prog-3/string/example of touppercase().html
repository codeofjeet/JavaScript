<html>
    <head>
        <title>example of touppercase()</title>
    </head>
    <body>
        <script type="text/javascript">
        //touppercase() change lower character string into upper case string 
        var n1="deepak mulchandani";
        var n2 = n1.toUpperCase();
        document.writeln("Your name in lower case is :- " + n1);
        document.writeln("<br>Your name in upper case is :- " + n2);
        </script>
    </body>
</html>
