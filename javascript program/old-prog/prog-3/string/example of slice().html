<html>
    <head>
        <title>example of slice()</title>
    </head>
    <body>
        <script type="text/javascript">
        //slice()
        var n1="once upon a time."
        var n2 = n1.slice(3,10);
        var n3 = n1.slice(-10,-4);
        document.writeln("Main string :- " + n1);
        document.writeln("<br>After slice 4th character to 10 character sliced string :-" + n2);
        document.writeln("<br>After slice -10 to -4 character sliced string :- " + n3);
        </script>
    </body>
</html>
