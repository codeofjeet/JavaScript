<html>
    <head>
        <title>example of string (new keyword)</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new String();
           emp[0]="jeetendra";
           emp[1]="deepak";
           emp[2]="amit";
          for(i in emp)
           {
            document.writeln(emp[i] + "<br>");
           }
           console.log(emp);
        </script>
    </body>
</html>
