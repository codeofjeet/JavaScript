<html>
    <head>
        <title>example of search()</title>
    </head>
    <body>
        <script type="text/javascript">
        //search() method is case sencetive
        var n1="Deepak Kumar Mulchandani";
        var v1 = n1.search('Kumar');
        var v2 = n1.search('kumar');
        var v3 = n1.search(/kumar/i); // i used for ignore case
        document.writeln("Your name is :- " + n1);
        document.writeln("<br>If search 'Kumar' in your name :- " + v1);
        document.writeln("<br>If search 'kumar' in your name :- " + v2);
        document.writeln("<br>If answer is '-1' than searching string is not found in main string")
        document.writeln("<br>If search 'kumar' in your name and used 'i' for ignore case :- " + v3);
        </script>
    </body>
</html>
