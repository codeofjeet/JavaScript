<html>
    <head>
        <title>example of concat()</title>
    </head>
    <body>
        <script type="text/javascript">
        //concat() is joint two string
        var n1="Deepak";
        var n2="Kumar";
        var n3="Mulchandani";
        var name = n1.concat(" ",n2," ",n3);
        document.writeln("After joint your full name is :- " + name);
        </script>
    </body>
</html>
