<html>
    <head>
        <title>example of charcodeAt()</title>
    </head>
    <body>
        <script type="text/javascript">
        //charcodeAt() returns particular position character ASCII value
        var name="Anil Kumar Jain";
        var value = name.charCodeAt(0);
        document.writeln("Your name is :- " + name);
        document.writeln("<br>ASCII code of first character is :- " + value)
        </script>
    </body>
</html>
