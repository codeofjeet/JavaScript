<html>
    <head>
        <title>example of title case-1</title>
    </head>
    <body>
        <input type="text" id="name">
        <br><br>
        <input type="button" onclick="titlecase()" value="Title Case">
        <br>
        <p id="tc"></p>

        <script type="text/javascript">
            function titlecase()
            {
                var nm = document.getElementById("name").value;
                var i;
                var ch = nm.charAt(0);
                ch=ch.toUpperCase();
                nm=nm.replaceAt(0,ch)
                for(i=1;i<nm.length;i++)
                {
                    if(nm[i]==" ")
                    {
                        ch=nm.charAt(i+1);
                        ch=ch.toUpperCase();
                        nm=nm.replaceAt(i+1,ch)
                    }
                }

                document.getElementById("tc").innerHTML=nm;
            }
         String.prototype.replaceAt = function(index, replacement) {
    return this.substring(0, index) + replacement + this.substring(index + replacement.length);
}
        </script>
    </body>
</html>
