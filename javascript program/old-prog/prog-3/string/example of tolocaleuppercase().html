<html>
    <head>
        <title>example of tolocaleuppercase()</title>
    </head>
    <body>
        <script type="text/javascript">
        //tolocaleuppercase() change lower character string into upper case string in your locale english
        var n1="deepak mulchandani";
        var n2 = n1.toLocaleUpperCase();
        document.writeln("Your name in lower case is :- " + n1);
        document.writeln("<br>Your name in upper case in your locale english is :- " + n2);
        </script>
    </body>
</html>
