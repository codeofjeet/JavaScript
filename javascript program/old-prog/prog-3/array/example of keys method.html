<html>
    <head>
        <title>example of keys method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array(30,45,50,25,90);
           var emp1 = emp.keys(); 
           document.writeln("After key method emp1 array :- " + emp1);
           document.writeln("<br>");
           for(i of emp1)
           {
            document.writeln(i);
           }
        </script>
    </body>
</html>
