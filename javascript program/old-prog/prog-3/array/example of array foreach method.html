<html>
    <head>
        <title>example of array foreach method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = [11,12,23,45,34,23,78,98,56,34];
           emp.forEach(function(x) {
            document.writeln(x + 2);
           });
        </script>
    </body>
</html>
