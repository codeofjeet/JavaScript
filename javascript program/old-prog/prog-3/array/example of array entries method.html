<html>
    <head>
        <title>example of array entries method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array("jeetendra","deepak","amit","bhupendra","gaurav","anil");
           var emp2 = emp.entries();
           for(i of emp2)
           {
            document.writeln( i + "<br>");
           }
        </script>
    </body>
</html>
