<html>
    <head>
        <title>example of pop method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = Array.of(1,2,3,4,"jeet",5,3,2)
           document.writeln("Before pop method array values :- " + emp);
           var a=emp.pop();
           document.writeln("<br>After pop() array values :- " + emp);
           document.writeln("<br>Pop value is :- " + a)
        </script>
    </body>
</html>
