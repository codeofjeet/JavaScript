<html>
    <head>
        <title>example of array fill method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = [30,45,50,25,90,34,56,12];
           var emp1 =emp.fill(100);
           document.writeln(emp1);
           var b = emp.fill(90,2,3);
           document.writeln("<br>" + b);
        </script>
    </body>
</html>
