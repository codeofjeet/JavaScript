<html>
    <head>
        <title>example of unshift method</title>
    </head>
    <body>
        <p>Element of no:</p>
        <input type"text" id="result">
        <p>After apply unshift method now element of no:</p>
        <input type="text" id="result1">
        <script type="text/javascript">
            //unshift method add one element at start of array
            var no = [3,4,5,6,7];
           document.getElementById("result").value=no;  
           no.unshift(1,2);
           document.getElementById("result1").value=no;  
        </script>
    </body>
</html>
