<html>
    <head>
        <title>example of array (new keyword)</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array();
           emp[0]="jeetendra";
           emp[1]="deepak";
           emp[2]="amit";
           for(i of emp)
           {
            document.writeln(i + "<br>");
           }
        </script>
    </body>
</html>
