<html>
    <head>
        <title>example of shift method</title>
    </head>
    <body>
        <script type="text/javascript">
            //shift method delet first element of an array
        var emp=[23,45,67,89,23,11,28];
        document.writeln("Befor shift method array value :- " + emp);
        var emp1=emp.shift()
        document.writeln("<br>After shift mehod array value :- " +emp);
        document.writeln("<br>First element is :- " + emp1);
        </script>
    </body>
</html>
