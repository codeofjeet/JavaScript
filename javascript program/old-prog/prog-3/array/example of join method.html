<html>
    <head>
        <title>example of join method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array(30,45,50,25,90);
           document.writeln("After join ('-') method emp array :- " + emp.join("-"));
           document.writeln("<br>After join (',') method emp array :- " + emp.join(", "));
        </script>
    </body>
</html>
