<html>
    <head>
        <title>example of tolocalesting method</title>
    </head>
    <body>
        <script type="text/javascript">
            document.writeln("the toLocaleString() method return a date object as a string using locale setting. The default language depends on the locale setup on your computer");
            const dt=new Date();
            var a=dt.toLocaleString();
            document.writeln("<br>Date is :- " + dt);
            document.writeln("<br>Date in string format :- " + a);
        </script>
    </body>
</html>
