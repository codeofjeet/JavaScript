<html>
    <head>
        <title>example of reduce method</title>
    </head>
    <body>
        <script type="text/javascript">
        var emp=[1,2,3,4];
        var a=emp.reduce(function(x,y) //x hold previous ans and y is hold one by one value of array
        {
            return x+y;
        });
        document.writeln(a);
        </script>
    </body>
</html>
