<html>
    <head>
        <title>example of array copywithin method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array("jeetendra","deepak","amit","bhupendra","gaurav","anil");
           var emp2 = emp.copyWithin(0,0,5) //base position, start position and end position
           for(i of emp2)
           {
            document.writeln(i + "<br>");
           }
        </script>
    </body>
</html>
