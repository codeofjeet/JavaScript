<html>
    <head>
        <title>example of tosting method</title>
    </head>
    <body>
        <script type="text/javascript">
            var no=15;
            document.writeln("no is :-" + no);
            var a=no.toString();
            document.writeln("<br> no in string format :- " + a);
            var b=no.toString(2);
            document.writeln("<br>No in binary format using toString mothod :- " + b);
            var o=no.toString(8);
            document.writeln("<br>No in octal format using toString method :- " + o);
            var h=no.toString(16);
            document.writeln("<br>No is hexa-decimal format using toString method :- " +h);
        </script>
    </body>
</html>
