<html>
    <head>
        <title>example of array findindex method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = [11,12,23,45,34,23,78,98,56,34];
           var emp1 = emp.findIndex(value=> value>30)
           document.writeln(emp1);
        </script>
    </body>
</html>
