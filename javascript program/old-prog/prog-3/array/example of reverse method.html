<html>
    <head>
        <title>example of reverse method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = Array.of(1,2,3,4,"jeet",5,3,2)
           document.writeln("Before reverse method array values :- " + emp);
           emp.reverse();
           document.writeln("<br>After reverse method array values :- " + emp);
        </script>
    </body>
</html>
