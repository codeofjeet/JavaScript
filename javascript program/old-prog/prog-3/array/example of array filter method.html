<html>
    <head>
        <title>example of array filter method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp1 = [45,34,23,78,98];
           function check(value)
           {
            return value > 34;
           }
           document.writeln(emp1.filter(check));
        </script>
    </body>
</html>
