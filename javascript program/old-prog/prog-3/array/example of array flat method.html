<html>
    <head>
        <title>example of array flat method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = [30,45,50,25,90,[34,56,12]];
           var emp1 = emp.flat();
           var a = new Array(1,2,3,4,[5,6,7,]);
           var b = a.flat();
           document.writeln(emp1);
           document.writeln("<br>" + b);
        </script>
    </body>
</html>
