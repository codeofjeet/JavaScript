<html>
    <head>
        <title>example of array indexof method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array(30,45,50,25,90,45,34,45);
           document.writeln(emp.indexOf(45));
           document.writeln("<br>" + emp.indexOf(45,2));//checking after 2nd positions
        </script>
    </body>
</html>
