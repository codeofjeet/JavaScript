<html>
    <head>
        <title>example of array concat method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = new Array("jeetendra","deepak","amit");
           var emp1 = new Array("bhupendra","gaurav","anil");
           var emp2 = emp.concat(emp1)
           for(i of emp2)
           {
            document.writeln(i + "<br>");
           }
        </script>
    </body>
</html>
