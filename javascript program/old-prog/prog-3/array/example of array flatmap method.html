<html>
    <head>
        <title>example of array flatmap method</title>
    </head>
    <body>
        <script type="text/javascript">
           var emp = [30,45,50,25,90,34,56,12];
           var emp1 = emp.flatMap((x) => x/2);
           document.writeln(emp1);
        </script>
    </body>
</html>
