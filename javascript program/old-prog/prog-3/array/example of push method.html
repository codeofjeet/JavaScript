<html>
    <head>
        <title>example of push method</title>
    </head>
    <body>
        <script type="text/javascript">
            // of method convert values into array
           var emp = Array.of(1,2,3,4,"jeet")
           document.writeln("Before push method array values :- " + emp);
           console.log(emp);
           emp.push(5);
           document.writeln("<br>After push(5) array values :- " + emp);
           //if you know that emp is a array than print it console
           console.log(emp);
        </script>
    </body>
</html>
