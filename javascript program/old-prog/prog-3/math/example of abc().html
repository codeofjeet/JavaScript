<html>
    <head>
        <title>example of abs()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n=-5;
        document.writeln("abs() of 5 is :- " + Math.abs(n));
        document.writeln("<br>abs() of [] is :- " +Math.abs([]));
        document.writeln("<br>abs() of 2,5 is :- " + Math.abs([2,5]));
        document.writeln("<br>abs() of abs() is :- " + Math.abs());
        </script>
    </body>
</html>
