<html>
    <head>
        <title>example of round()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=4.4;
        var n2=6.7;
        document.writeln("Round of 4.4 is :- " + Math.round(n1));
        document.writeln("<br>Round of 6.7 is :- " + Math.round(n2));
        </script>
    </body>
</html>
