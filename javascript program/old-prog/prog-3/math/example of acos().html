<html>
    <head>
        <title>example of acos()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=-1;
        document.writeln("acos of -1 is :- " + Math.acos(n1));
        document.writeln("<br>acos of 0 is :- " + Math.acos(0));
        document.writeln("<br>acos of 1 is :- " + Math.acos(1));
        </script>
    </body>
</html>
