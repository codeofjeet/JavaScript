<html>
    <head>
        <title>example of ceil()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n=8.9;
        document.writeln("Ceil value of 8.9 is :-" + Math.ceil(n));
        var n1=-9.5;
        document.writeln("<br>Ceil value of -9.5 is :- " + Math.ceil(n1));
        </script>
    </body>
</html>
