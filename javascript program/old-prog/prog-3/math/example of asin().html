<html>
    <head>
        <title>example of asin()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=-1;
        document.writeln("asin of -1 is :- " + Math.asin(n1));
        document.writeln("<br>asin of 0.5 is :- " + Math.asin(0.5));
        document.writeln("<br>asin of 1 is :- " + Math.asin(1));
        </script>
    </body>
</html>
