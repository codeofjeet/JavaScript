<html>
    <head>
        <title>example of log()</title>
    </head>
    <body>
        <script type="text/javascript">
       var n1=16;
        document.writeln("Log of 16 is :- " + Math.log(n1));
        document.writeln("<br>Log of 1 is :- " + Math.log(1));
        document.writeln("<br>Log of 25 is :- " + Math.log(25));
        </script>
    </body>
</html>
