<html>
    <head>
        <title>example of sign()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=9;
        var n2=-3
        var n3=0;
        document.writeln("sign of 9 is :- " + Math.sign(n1));
        document.writeln("<br>sign of -3 is :- " + Math.sign(n2));
        document.writeln("<br>sign of 0 is :- " + Math.sign(n3));
        </script>
    </body>
</html>
