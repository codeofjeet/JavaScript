<html>
    <head>
        <title>example of floor()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=7.9;
        document.writeln("Floor value of 7.9 is :- " + Math.floor(n1));
        var n2=-4.3;
        document.writeln("<br>Floor value of -4.3 is :- " + Math.floor(n2));
        </script>
    </body>
</html>
