<html>
    <head>
        <title>example of trunc()</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=9.9;
        var n2=-9.8
        var n3 =99;
        document.writeln("Truncat of 9.9 is :- " + Math.trunc(n1));
        document.writeln("<br>Truncat of -9.8 is :- " + Math.trunc(n2));
        document.writeln("<br>Truncat of 99 is :- " + Math.trunc(n3));
        </script>
    </body>
</html>
