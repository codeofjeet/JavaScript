<!DOCTYPE html>
<html>
<body>

<h1>JavaScript Arrays</h1>
<h2>The shift() Method</h2>

<p>shift() removes the first item of an array:</p>

<p id="demo"></p>

<script>
const fruits = ["Banana", "Orange", "Apple", "Mango"];
fruits.shift();

document.getElementById("demo").innerHTML = fruits;
</script>

</body>
</html>
