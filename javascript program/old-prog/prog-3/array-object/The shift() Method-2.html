<!DOCTYPE html>
<html>
<body>

<h1>JavaScript Arrays</h1>
<h2>The shift() Method</h2>

<p>shift() returns the removed array element:</p>

<p id="demo"></p>

<script>
const fruits = ["Banana", "Orange", "Apple", "Mango"];
document.getElementById("demo").innerHTML = fruits.shift();
</script>

</body>
</html>
