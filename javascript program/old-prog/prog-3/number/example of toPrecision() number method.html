<html>
    <head>
        <title>example of toPrecision() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        //toPrecision() its conver data to string and its count full no
        document.writeln("<h3>toPrecision method convert answer into string and its count no and decimal point to gather if you set 4 digit than output 4 digit of no include decimal part</h3><br>")
        var n=45.3456987;
        document.writeln("value of 45.3456987 set precision 4 than answer is :- " +n.toPrecision(4));
        var x=n.toPrecision(4) + 10;
        document.writeln("<br>value x (n.toPrecision(4)+10) is :- " + x);
        </script>
    </body>
</html>
