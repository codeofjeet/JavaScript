<html>
    <head>
        <title>example of number</title>
    </head>
    <body>
        <script type="text/javascript">
        document.writeln("<h3>All type numbers<br></h3>")
        var x = 123;
        var y = 12.3
        var z = 12e4;
        var w = new Number(33);
        document.writeln("Value of x (normal integer value) is :- " + x);
        document.writeln("<br>Value of y (float/real value) is :- " + y);
        document.writeln("<br>Value of z (exponantion value) is :- " + z);
        document.writeln("<br>Value of w (new constructor value) is :- " + w);
        </script>
    </body>
</html>
