<html>
    <head>
        <title>example of parseFloat() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1="59.67";
        var n2="65";
        var n3="77ji";
        document.writeln("Foat value of '59.67' string value is :- " + Number.parseFloat(n1));
        document.writeln("<br>Foat value of '65' string value is :- " + Number.parseFloat(n2));
        document.writeln("<br>Foat value of '77ji' string value is :- " + Number.parseFloat(n3));
        </script>
    </body>
</html>
