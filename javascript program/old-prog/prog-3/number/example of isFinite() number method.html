<html>
    <head>
        <title>example of isFinite() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        var n=2;
        document.writeln("To check that 2 is finite no :- " + Number.isFinite(n));
        document.writeln("<br>To check that 'h' is finite :- " +Number.isFinite('h'));
        document.writeln("<br>To check that -6 is finite no :- " +Number.isFinite(-6));
        document.writeln("<br>To check that 0 to 10 no is finite :- " + Number.isFinite(0,10));
        document.writeln("<br>To check that 10 to 0 no is finite :- " + Number.isFinite(10,0));
        </script>
    </body>
</html>
