<html>
    <head>
        <title>example of number constant in javascript</title>
    </head>
    <body>
        <script type="text/javascript">
        document.writeln("<h3>All type numbers constant value in javascript<br></h3>")
        document.writeln("Minimum constant vlue in javascript is :- " + Number.MIN_VALUE);
        document.writeln("<br>Maximum constant value in javascript is :- " + Number.MAX_VALUE);
        document.writeln("<br>Positive infinitive value in javascript is :- "+ Number .POSITIVE_INFINITIVE);
        document.writeln("<br>Negative infinitive value in javascript is :- " + Number.NEGATIVE_INFINITIVE);
        document.writeln("<br>To check that 5 is Not a Number (NaN) :- " + Number.isNaN(5));
        document.writeln("<br>To check that 'hello' is NaN :- " + isNaN('hello'));
        </script>
    </body>
</html>
