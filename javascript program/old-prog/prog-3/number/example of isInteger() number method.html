<html>
    <head>
        <title>example of isInteger() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1=9;
        var n2=99.8;
        var n3=NaN;
        var n4=Infinity;
        document.writeln("To check that 9 is integer no :- " + Number.isInteger(n1));
        document.writeln("<br>To check that 99.8 is integer no :- " + Number.isInteger(n2));
        document.writeln("<br>To check that NaN is integer no :- " + Number.isInteger(n3));
        document.writeln("<br>To check that infinity is integer no :- " + Number.isInteger(n4));
        </script>
    </body>
</html>
