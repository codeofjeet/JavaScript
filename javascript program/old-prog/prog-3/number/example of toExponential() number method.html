<html>
    <head>
        <title>example of toExponential() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        var n=2;
        var n1=5
        document.writeln("Exponential of 2 with base 2 is :-" +  n.toExponential(2));
        document.writeln("<br>Exponential of 5 with base 2 is :- " +n1.toExponential(2));//2 is base value
        </script>
    </body>
</html>
