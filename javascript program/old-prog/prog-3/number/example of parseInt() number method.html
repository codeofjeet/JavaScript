<html>
    <head>
        <title>example of parseInt() number method</title>
    </head>
    <body>
        <script type="text/javascript">
        var n1="59.67";
        var n2="65";
        var n3="77.88ji";
        document.writeln("Integer value of '59.67' string value is :- " + Number.parseInt(n1));
        document.writeln("<br>Integer value of '65' string value is :- " + Number.parseInt(n2));
        document.writeln("<br>Integer value of '77.88ji' string value is :- " + Number.parseInt(n3));
        </script>
    </body>
</html>
