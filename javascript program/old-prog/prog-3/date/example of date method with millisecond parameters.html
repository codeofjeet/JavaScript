<html>
    <head>
        <title>example of date method with millisecond parameters</title>
    </head>
    <body>
        <script type="text/javascript">
        //Date(milisecond)
        var n1=new Date(0);
        document.writeln(n1);
        var n2=new Date(1000000);
        document.writeln("<br>" + n2);
        </script>
    </body>
</html>
