<html>
    <head>
        <title>example of getDay</title>
    </head>
    <body>
        <script type="text/javascript">
        //getDate() use to get any date from source
        var n1=new Date();
        var day = n1.getDay()
        switch(day)
        {
            case 0:
            document.writeln("Today Day is Sunday");
            break;

            case 1:
            document.writeln("Today Day is Monday");
            break;

            case 2: 
            document.writeln("Today Day is Tuesday");
            break;

            case 3:
            document.writeln("Today Day is Wednesday");
            break;

            case 4: 
            document.writeln("Today Day is Thursday");
            break;

            case 5: 
            document.writeln("Today Day is Friday");
            break;

            case 6: 
            document.writeln("Today Day is Saturday");
            break;

            default:
            document.writeln("Wrong week day");
        }
        </script>
    </body>
</html>
