<html>
    <head>
        <title>example of getMillisecond()</title>
    </head>
    <body>
        <script type="text/javascript">
        //getMillisecond() //return the milliseconds of a date as a number (0-999)
        var n1=new Date();
        document.writeln("Current milliseconds :- " + n1.getMilliseconds());
        </script>
    </body>
</html>
