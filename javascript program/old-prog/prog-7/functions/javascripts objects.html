<html>
    <head>
        <title>example of javascript objects</title>
    </head>
    <body>
        <script type="text/javascript">
            //object literal
        document.writeln("Object literal");
        var person = {
            firstname: "jeetendra",
            lastname:  "gangwar",
            age: 52
        }
        document.writeln("<br>Details of person :-<br>" + person.firstname + "<br>" + person.lastname + "<br>" + person.age);
        
        //creating an object uing new keyword (instent)
        document.writeln("<br>Object instent (new keyword)");
        var emp = new Object();
        emp.id=1;
        emp.name="jeetendra gangwar";
        emp.salary=25000;
        document.writeln("<br>Details of employee :-<br>" + emp.id + "<br>" + emp.name + "<br>" + emp.salary);

        //using for
        document.writeln("<br>Employee details using for . . . in <br>");
        for(i in emp)
        {
            document.writeln(emp[i] + "<br>");
        }
        //using an object constructor
        document.writeln("<br>Object creating using constructor");
        function employee(id,name,salary)
        {
            this.id=id;
            this.name=name;
            this.salary=salary;
        }
        var e1 = new employee(2,"deepak",30000);
        document.writeln("<br>Employee details using for . . . in <br>")
        for(i in e1)
        {
            document.writeln(e1[i] + "<br>");
        }
        </script>
    </body>
</html>
