<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document.Write() Function</title>
</head>
<body>
    
    <script>
        document.write("Hi, My name is Rakesh Kumar");
        document.write("<br/>")
        document.write("Sum of 5 and 3 is :- ", 5+3);
        document.write("<br/>")
        document.write(`sum of ${5} and ${3} is :- ${5+3}`);
    </script>

    <pre>
        <script>
            document.write("Hello World!");
            document.write("Have a nice day!");
            document.write("<br>");
            document.writeln("Hello World!");
            document.writeln("Have a nice day!");
        </script>
    </pre>
    </script>
</body>
</html>
