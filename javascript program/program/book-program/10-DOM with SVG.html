<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG with JavaScript</title>
</head>
<body>
  <!-- Empty container for SVG -->
  <div id="svgContainer"></div>

  <script>
    // Create the SVG element
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("width", 200);
    svg.setAttribute("height", 200);
    svg.setAttribute("style", "border: 1px solid black");

    // Create a circle
    const circle = document.createElementNS(svgNS, "circle");
    circle.setAttribute("cx", 100); // center x
    circle.setAttribute("cy", 100); // center y
    circle.setAttribute("r", 50);   // radius
    circle.setAttribute("fill", "skyblue");

    // Append circle to SVG
    svg.appendChild(circle);

    // Append SVG to the page
    document.getElementById("svgContainer").appendChild(svg);
  </script>
</body>
</html>
