<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Built-in Constants</title>
</head>
<body>
    
    <script>
        // null :- null is used for representing the intentional absence of an object value and is a primitive value. Unlike undefined, it is not a property of the global object. CAREFUL: The typeof null is 'object'.

        let no = null;
        console.log(no == undefined);
        console.log(no === undefined);
        console.log(typeof no);

        // NaN :- stands for "Not a Number." When a mathematical function or operation in JavaScript cannot return a specific number, it returns the value NaN instead. check NaN old (isNaN()) new is (Number.isNaN()). In ECMAScript 6, the Number.isNaN() function has been implemented primarily to avoid the problem ofwindow.isNaN() of forcefully converting the parameter to a number. Number.isNaN(), indeed, doesn't try to convert the value to a number before testing.

        Number.isNaN(NaN); // true
        Number.isNaN(1); // false
        Number.isNaN(-2e-4); // false
        Number.isNaN(Infinity); // false
        Number.isNaN(true); // false
        Number.isNaN(false); // false
        Number.isNaN(null); // false
        Number.isNaN(""); // false
        Number.isNaN(" "); // false
        Number.isNaN("45.3"); // false
        Number.isNaN("1.2e3"); // false
        Number.isNaN("Infinity"); // false
        Number.isNaN(new Date); // false
        Number.isNaN("10$"); // false
        Number.isNaN("hello"); // false
        Number.isNaN(undefined); // false
        Number.isNaN(); // false
        Number.isNaN(function(){}); // false
        Number.isNaN({}); // false
        Number.isNaN([]); // false
        Number.isNaN([1]); // false
        Number.isNaN([1, 2]); // false
        Number.isNaN([true]); // false
        console.log(typeof NaN);
        console.log(NaN == NaN);
        console.log(NaN === NaN);

        // undefined and null :- undefined is the absence of a value in the compiler, because where it should be a value, there hasn't been put one, like the case of an unassigned variable. null is an object that indicates that a variable has been explicitly assigned "no value".

        //undefined

        let numb;
        console.log('is numb undefined?:- ', numb === undefined);

        let student = { name: 'Deepak' };
        console.log('is student(age) undefined? :- ', student.age === undefined);
        console.log('is student(name) undefined? :- ', student.name === undefined);

        function display() { return; }
        console.log('is display function undefined?', display() === undefined);

        function display1(no) { 
            console.log('is no undefined?', no === undefined);
        }
        display1(10);
        display1();  
        
        // undefined is also a property of the global window object. Only in browsers
        console.log(window.undefined); // undefined
        console.log(window.hasOwnProperty('undefined')); // true


        //Infinity and -Infinity :- Infinity is a property of the global object (therefore a global variable) that represents mathematical infinity. It is a reference to Number.POSITIVE_INFINITY. no division by 0 errors in JavaScript, there is Infinity!

        console.log(Infinity > 123192310293); // true
        console.log(-Infinity < -123192310293); // true
        console.log(1 / 0); // Infinity
        console.log(Math.pow(123123123, 9123192391023)); // Infinity
        console.log(Number.MAX_VALUE * 2); // Infinity
        console.log(23 / Infinity); // 0
        console.log(-Infinity); // -Infinity
        console.log(-Infinity === Number.NEGATIVE_INFINITY); // true
        console.log(-0); // -0 , yes there is a negative 0 in the language
        console.log(0 === -0); // true
        console.log(1 / -0); // -Infinity
        console.log(1 / 0 === 1 / -0); // false
        console.log(Infinity + Infinity); // Infinity


        //Number constants

        console.log(Number.MAX_VALUE); // 1.7976931348623157e+308
        console.log(Number.MAX_SAFE_INTEGER); // 9007199254740991
        console.log(Number.MIN_VALUE); // 5e-324
        console.log(Number.MIN_SAFE_INTEGER); // -9007199254740991
        console.log(Number.EPSILON); // 0.0000000000000002220446049250313
        console.log(Number.POSITIVE_INFINITY); // Infinity
        console.log(Number.NEGATIVE_INFINITY); // -Infinity
        console.log(Number.NaN); // NaN


        //Operations that return NaN

       console.log( "b" * 3);
       console.log(0 / 0);
       console.log("cde" - "e");
       console.log([1, 2, 3] * 2);
       // But an exception: Single-number arrays.
       console.log([2] * [3]);  //6
    </script>
</body>
</html>
