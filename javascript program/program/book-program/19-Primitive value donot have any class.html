<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primitive values are not considered instances of any class</title>
</head>
<body>
    <h1>Primitive values are not considered instances of any class:</h1>

    <script>
        console.log(2 instanceof Number) //false
        console.log('abc' instanceof String) //false
        console.log(true instanceof Boolean) //false
        console.log(Symbol() instanceof Symbol) //false

        // instanceof also catches instances of subclasses, using obj.constructor does not
        console.log([] instanceof Object, [] instanceof Array) //true true
        console.log([].constructor === Object, [].constructor === Array) //false true

        function isNumber(value) {
            //null.constructor and undefined.constructor throw an error when accessed
            if (value === null || value === undefined) return false
                return value.constructor === Number
        }
        console.log(isNumber(null), isNumber(undefined)) //false false
        console.log(isNumber('abc'), isNumber([]), isNumber(() => 1)) //false false false
        console.log(isNumber(0), isNumber(Number('10.1')), isNumber(NaN)) //true true true

        //Getting object type by constructor name
        console.log(Object.prototype.toString.call("String"));
        console.log(Object.prototype.toString.call(42));
        console.log(Object.prototype.toString.call(true));
        console.log(Object.prototype.toString.call(Object()));
        //or
        console.log(Object.prototype.toString.call({}));
        console.log(Object.prototype.toString.call(function(){}));
        console.log(Object.prototype.toString.call(new Date(2015,10,21)));
        console.log(Object.prototype.toString.call(new RegExp()));
        //or
        console.log(Object.prototype.toString.call(/foo/));
        console.log(Object.prototype.toString.call([]));
        console.log(Object.prototype.toString.call(null));
        console.log(Object.prototype.toString.call(undefined));
        console.log(Object.prototype.toString.call(Error()));
    </script>
</body>
</html>
