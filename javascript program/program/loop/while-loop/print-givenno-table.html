<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Input No Table</title>
</head>
<body>
    <script>
        let i = 1,no;
        no=parseInt(prompt("Enter any no:- "));
        while(i <= 10){
            document.write("<br/>" + no*i);
            i = i + 1;
        }
    </script>
</body>
</html>
