<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display First 10 Natural No</title>
</head>
<body>
    <script>
        let i;
        for(i=1; i<=10; i=i+1){
            document.write("<br/>" + i);
        }
    </script>
</body>
</html>
