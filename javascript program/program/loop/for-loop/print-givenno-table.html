<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Input No Table</title>
</head>
<body>
    <script>
        let i, no;
        no=parseInt(prompt("Enter any no:- "));
        for(i=1; i<=10; i=i+1){
            document.write("<br/>" + no*i);
        }
    </script>
</body>
</html>
