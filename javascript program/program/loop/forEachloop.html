<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forEach loop</title>
</head>
<body>
    
    <script>
        let no = [4, 8,11, 34, 21, 89, 43]

        let calDouble = (num) => {
            document.write(num*2, " ");
        }

        no.forEach(calDouble);
    </script>
</body>
</html>
