<html lang="en">
<head>

    <title>Maximum no out of two</title>
</head>
<body>
    <h3 id="pr">hi</h3>
    <script>

        if(no1>no2){

        }

              document.getElementById('pr').innerHTML="No2 is max no";
        }
    </script>
