<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>even-odd</title>
    <style>
        p{
            text-align: center;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <p id="print">hi</p>
    
    <script>
        let no;
        no=parseInt(prompt("Enter any no:- "));
        if(no%2 === 0){
            document.getElementById('print').innerHTML="Even no";
        }
        else{
            document.getElementById('print').innerHTML="Odd no";
        }
    </script>
</body>
</html>
