<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="leap"></h1>

    <script>
        let year;
        year = parseInt(prompt("Enter any year:- "));

        if((year % 4 == 0 && year % 100 !=0) || (year % 400 ==0)){
            document.getElementById('leap').innerHTML = "Leap year";
        }
        else{
            document.getElementById('leap').innerHTML = "Not leap year";
        }
    </script>
</body>
</html>
