<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- input total telephone calls and find out telephone bill amount
    tc<=100     .50pc
    tc<=200     .80pc
    tc<=300     1.20pc
    tc<=400     1.50pc
    tc>400      2pc -->

    <h1 class="dis"></h1>

    <script>
        let tc, ba;
        tc=parseInt(prompt("Enter total telephone calls:- "));

        if(tc<=100){
            ba=tc*.50;
        }
        else if(tc<=200){
            ba=50+(tc-100)*.80;
        }
        else if(tc<=300){
            ba=130+(tc-200)*1.20;
        }
        else if(tc<=400){
            ba=250+(tc-300)*1.50;
        }
        else{
            ba=400+(tc-400)*2
        }
        document.querySelector('.dis').innerHTML="Total telephone bill:- "+ ba;
    </script>
</body>
</html>
