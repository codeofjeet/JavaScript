<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Salary
    </title>
</head>
<body>

    <script>
        let bs, da, hra, ma, ts;
        bs=parseFloat(prompt("Enter your basic salary:-"));
        da=bs*.98;
        hra=bs*.15;
        ma=bs*.05;
        ts=bs+da+hra+ma;
        document.write(`Total salary is ${ts}` );
    </script>
</body>
</html>
