<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Two No's</title>
</head>
<body>
    
    <script>
        let no1;
        let no2;
        let sum;

        no1 = parseInt(prompt("Enter first no:-"));
        no2 = parseInt(prompt("Enter second no:-"));
        sum = no1 + no2;
        document.write(`Sum of ${no1} and ${no2} is :- ${sum}`);
    </script>
</body>
</html>
