<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap two no using third variable </title>
</head>
<body>
    
    <script>
        let no1;
        let no2;
        let temp;
        no1=parseInt(prompt("Enter first no:- "));
        no2=parseInt(prompt("Enter second no:- "));
        temp=no1;
        no1=no2;
        no2=temp;
        document.write(`After swap no1 is ${no1} and no2 is ${no2}`);
    </script>
</body>
</html>
