<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input</title>
</head>
<body>
    
    <script>
        let name;
        name = prompt("Enter Your Name :- ");
        document.write("Your Name is :- ", name);
        document.write(`<br/> Your Name is; ${name}`);
    </script>
</body>
</html>
