<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let no, a;
        let rev=0;
        no=parseInt(prompt("Enter 3 digit no:- "));

        a = no%10;
        rev = rev * 10 + a; 
        no = parseInt(no/10);      
        a=no%10;                   
        rev = rev*10+a;         
        no=parseInt(no/10);         
        a=no%10;                
        rev = rev*10+a;     
        document.write(`Reverse no is:- ${rev}`);
    </script>
</body>
</html>
