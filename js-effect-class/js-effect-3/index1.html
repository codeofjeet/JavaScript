<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Opacity & Scale Effect</title>
  <style>
    .image-container img {
      width: 300px;
      height: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .image-container img:hover {
      opacity: 0.2;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="image-container">
    <img src="image/pic1.jpg">
  </div>

</body>
</html>
