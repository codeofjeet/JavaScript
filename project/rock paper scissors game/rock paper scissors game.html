<html>
    <head>
        <title>Rock Paper Scissors Game</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section class="container">
            <!-- Result display section -->
            <div class="result_field">
                <!-- Container for user and BOT result images -->
                <div class="result_images">
                    <span class="user_result">
                        <p style="color:red; font-size:1.3vw; font-weight: bolder">You</p>
                        <img src="images/rock.png" title="User's choice image" />
                    </span>
                    <span class="bot_result">
                        <p style="color:blue; font-size:1.3vw; font-weight: bolder">Computer</p>
                        <img src="images/rock.png" title="BOT's choice image" />
                    </span>
                </div>
                <!-- Display the game result message -->
                <div class="result">Let's Play!</div>
            </div>
        
            <!-- Options for user to choose from -->
            <div class="option_images">
                <span class="option_image">
                    <img src="images/rock.png" />
                    <p>Rock</p>
                </span>
                <span class="option_image">
                    <img src="images/paper.png" />
                    <p>Paper</p>
                </span>
                <span class="option_image">
                    <img src="images/scissor.png" />
                    <p>Scissors</p>
                </span>
            </div>
        </section>
        <script src="script.js" defer></script>
    </body>
</html>
