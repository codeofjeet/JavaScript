<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="container">
        <h1>MBI Calculator</h1>
        <form>
            <p class="p1"><label>Height in CM : </label> <input type="text" id="height" /></p>
            <p class="p1"><label>Weight in KG : </label> <input type="text" id="weight" /></p>
            <button>Calculate</button>

            <div id="results"></div>
            <div id="weight-guide">
                <h3>BMI Weight Guide</h3>
                <p class="p3">Under Weight = Less than 18.6</p>
                <p class="p3">Normal Range = 18.6 - 24.9</p>
                <p class="p3">Overweight = Greater than 24.9</p>
            </div>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
