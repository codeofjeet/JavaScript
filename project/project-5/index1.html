<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Code Editor</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      margin: 0;
      font-family: 'Courier New', monospace;
      height: 100vh;
    }

    #editor {
      flex: 1;
      padding: 10px;
      background: #1e1e1e;
      color: #ffffff;
      border: none;
      outline: none;
      font-size: 16px;
      resize: none;
    }

    #run {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #output {
      flex: 1;
      border: none;
      background: white;
    }

    .container {
      display: flex;
      flex: 1;
    }

    .left, .right {
      flex: 1;
      height: 100%;
    }
  </style>
</head>
<body>
  <button id="run">Run Code ▶️</button>
  <div class="container">
    <textarea id="editor" placeholder="Write your HTML/JS code here..."></textarea>
    <iframe id="output" class="right"></iframe>
  </div>

  <script>
    const runButton = document.getElementById('run');
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');

    runButton.addEventListener('click', () => {
      const code = editor.value;
      output.srcdoc = code;
    });

  </script>
</body>
</html>
